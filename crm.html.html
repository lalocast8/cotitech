<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaCRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#1d9e75;--accent-light:#e1f5ee;--accent-dark:#085041;
  --bg:#f4f3f0;--surface:#fff;--surface2:#f1efe8;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --rad:8px;--rad-lg:12px;--nav-w:220px;
  --shadow:0 1px 3px rgba(0,0,0,0.06);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{display:flex;min-height:100vh}
.nav{width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10;overflow-y:auto}
.nav-brand{padding:18px 16px 14px;font-size:15px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.brand-dot{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700}
.nav-section{padding:14px 14px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;font-size:13px;cursor:pointer;color:var(--text2);border-radius:var(--rad);margin:1px 6px;transition:all .13s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{color:var(--accent-dark);background:var(--accent-light);font-weight:500}
.nav-spacer{flex:1}
.nav-footer{padding:10px;border-top:1px solid var(--border)}
.nav-user{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--rad);background:var(--surface2)}
.nav-av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.main{margin-left:var(--nav-w);flex:1;padding:26px 28px;min-height:100vh}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-subtitle{font-size:12px;color:var(--text3);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-lg);padding:14px 16px;box-shadow:var(--shadow)}
.metric-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.metric.accent{background:var(--accent-light);border-color:#9fe1cb}
.metric.accent .metric-value{color:var(--accent-dark)}
.forecast-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-lg);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow)}
.forecast-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.forecast-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.forecast-label{font-size:12px;color:var(--text2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.forecast-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:7px;overflow:hidden}
.forecast-bar-fill{height:100%;border-radius:4px;background:var(--accent)}
.forecast-val{font-size:12px;font-weight:600;color:var(--accent-dark);min-width:80px;text-align:right}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-lg);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-pad{padding:16px 18px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
.av{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av-row{display:flex;align-items:center;gap:8px}
.av-0{background:#e1f5ee;color:#085041}.av-1{background:#e6f1fb;color:#0c447c}
.av-2{background:#faeeda;color:#633806}.av-3{background:#faece7;color:#712b13}
.av-4{background:#eeedfe;color:#3c3489}.av-5{background:#eaf3de;color:#27500a}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:500}
.bg-green{background:#eaf3de;color:#27500a}.bg-amber{background:#faeeda;color:#633806}
.bg-blue{background:#e6f1fb;color:#0c447c}.bg-gray{background:#f1efe8;color:#5f5e5a}
.bg-teal{background:#e1f5ee;color:#085041}.bg-purple{background:#eeedfe;color:#3c3489}
.btn{padding:7px 14px;font-size:13px;border-radius:var(--rad);border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text);font-weight:500;transition:all .13s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-accent{background:var(--accent);color:white;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent-dark)}
.btn-danger{background:#fcebeb;color:#791f1f;border-color:#f7c1c1}
.btn-danger:hover{background:#f7c1c1}
.btn-sm{padding:4px 9px;font-size:12px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{width:100%;padding:7px 11px 7px 32px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--surface);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
select.filter{padding:7px 11px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--surface);color:var(--text);cursor:pointer;outline:none}
.pipeline-wrap{overflow-x:auto;padding-bottom:8px}
.pipeline{display:grid;gap:10px;min-width:600px}
.stage{background:var(--surface2);border-radius:var(--rad-lg);padding:11px;min-height:200px}
.stage-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.stage:hover .stage-del-btn{opacity:1!important}
.stage-forecast{font-size:11px;color:var(--text3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:10px 11px;margin-bottom:7px;transition:border-color .13s}
.deal-card:hover{border-color:var(--accent)}
.deal-card.won{border-left:3px solid #1d9e75;background:#fcfffc}
.deal-card.lost{border-left:3px solid #888780;opacity:.65}
.deal-card.overdue{border-color:#f09595;background:#fff8f8}
.deal-card.due-today{border-color:#fac775;background:#fffbf3}
.deal-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deal-co{font-size:11px;color:var(--text3);margin-bottom:5px}
.deal-val{font-size:13px;color:var(--accent-dark);font-weight:700}
.prob-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px;background:var(--accent)}
.followup{display:flex;align-items:center;gap:4px;margin-top:6px;padding:4px 7px;border-radius:5px;font-size:11px;font-weight:500}
.followup.overdue{background:#fcebeb;color:#a32d2d}
.followup.today{background:#faeeda;color:#854f0b}
.followup.upcoming{background:#e6f1fb;color:#185fa5}
.followup.none{background:var(--surface2);color:var(--text3);cursor:pointer}
.act-item{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.act-icon.call{background:#e6f1fb}.act-icon.email{background:#eaf3de}
.act-icon.meet{background:#faeeda}.act-icon.note{background:#eeedfe}
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:20px}
.vendor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-lg);padding:16px 18px;box-shadow:var(--shadow)}
.vendor-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.vendor-stat{background:var(--surface2);border-radius:var(--rad);padding:10px 12px}
.vendor-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.vendor-stat-val{font-size:17px;font-weight:700}
.vendor-stat.accent{background:var(--accent-light)}
.vendor-stat.accent .vendor-stat-val{color:var(--accent-dark)}
.vendor-stat.accent .vendor-stat-label{color:var(--accent)}
.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:var(--rad);padding:3px;margin-bottom:18px;width:fit-content}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2);transition:all .13s;font-weight:500}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.config-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-lg);padding:18px 20px}
.config-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.config-item:last-child{border-bottom:none}
.config-add{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.config-add input,.config-add select{flex:1;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg);color:var(--text);outline:none}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rad-lg);border:1px solid var(--border);padding:22px;width:440px;max-width:95vw;box-shadow:0 8px 30px rgba(0,0,0,.13);animation:fadeUp .18s ease;max-height:90vh;overflow-y:auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg);color:var(--text);outline:none;transition:border .13s;font-family:inherit}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--accent)}
.form-field textarea{resize:vertical;min-height:65px}
.form-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px}
.toast{position:fixed;bottom:22px;right:22px;background:#1a1a18;color:white;padding:9px 16px;border-radius:var(--rad);font-size:13px;z-index:999;animation:fadeUp .18s ease}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:800px){
  .nav{width:54px}
  .nav-brand span,.nav-item span,.nav-section{display:none}
  .nav-item{justify-content:center;padding:8px}
  .main{margin-left:54px;padding:14px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-brand"><div class="brand-dot">N</div><span>NovaCRM</span></div>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="show('dashboard')" id="nav-dashboard"><span style="width:18px;text-align:center">📊</span><span>Dashboard</span></div>
    <div class="nav-item" onclick="show('contactos')" id="nav-contactos"><span style="width:18px;text-align:center">👤</span><span>Contactos</span></div>
    <div class="nav-item" onclick="show('pipeline')" id="nav-pipeline"><span style="width:18px;text-align:center">📈</span><span>Pipeline</span></div>
    <div class="nav-item" onclick="show('actividades')" id="nav-actividades"><span style="width:18px;text-align:center">⏰</span><span>Actividades</span></div>
    <div class="nav-section">Equipo</div>
    <div class="nav-item" onclick="show('vendedores')" id="nav-vendedores"><span style="width:18px;text-align:center">🧑‍💼</span><span>Vendedores</span></div>
    <div class="nav-section">Sistema</div>
    <div class="nav-item" onclick="show('configuracion')" id="nav-configuracion"><span style="width:18px;text-align:center">⚙️</span><span>Configuración</span></div>
    <div class="nav-spacer"></div>
    <div class="nav-footer">
      <div class="nav-user">
        <div class="nav-av">CRM</div>
        <div style="flex:1;overflow:hidden"><div style="font-size:12px;font-weight:500">Mi CRM</div><div style="font-size:11px;color:var(--text3)">Admin</div></div>
      </div>
    </div>
  </nav>
  <main class="main" id="mc"></main>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <p class="modal-title" id="mt"></p>
    <div id="mb"></div>
    <div class="modal-footer">
      <button class="btn" onclick="if(window._schedClose){window._schedClose();window._schedClose=null;}else{closeModal();}">Cancelar</button>
      <button class="btn btn-accent" id="btn-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>
<script>
// Este es el código JS original del CRM sin modificaciones
const K={c:'nc_c2',d:'nc_d5',a:'nc_a2',s:'nc_s5',v:'nc_v2',lr:'nc_lr2',kpi:'nc_kpi2'};
const DC=[{id:1,name:'Laura Méndez',company:'Grupo Alfa',email:'laura@alfa.mx',phone:'81-2200-0011',status:'Cliente',value:48000,notes:''},{id:2,name:'Carlos Rivera',company:'TechNova SA',email:'crivera@technova.com',phone:'55-3100-4422',status:'Prospecto',value:22000,notes:''},{id:3,name:'Ana Gutiérrez',company:'Inversiones MX',email:'ana.g@invmx.com',phone:'33-4400-9900',status:'Cliente',value:75000,notes:''},{id:4,name:'Diego Torres',company:'Constructora Reyes',email:'dtorres@reyes.mx',phone:'81-9900-1122',status:'Interesado',value:31000,notes:''},{id:5,name:'Sofía Leal',company:'Moda Plus',email:'sofia@modaplus.mx',phone:'55-7788-3300',status:'Prospecto',value:12000,notes:''}];
const DS=[{name:'1. Prospecto General',prob:10},{name:'2. Prospecto Calificado',prob:25},{name:'3. Visita Pendiente',prob:40},{name:'4. Info Pendiente',prob:55},{name:'5. Cotizacion Enviada',prob:70},{name:'6. Ganada',prob:100},{name:'Stand BY',prob:20},{name:'Perdida',prob:0}];
// Aquí va la data de deals — es muy extensa, usa la misma del archivo crm 7.html original
const DD=[];
const DA=[{id:1,type:'call',title:'Llamada con Laura Méndez',desc:'Seguimiento propuesta Q2',time:'Hace 30 min',contactName:'Laura Méndez',date:'2025-03-18'},{id:2,type:'meet',title:'Reunión con Diego Torres',desc:'Presentación de soluciones',time:'Hoy 11:00',contactName:'Diego Torres',date:'2025-03-18'}];
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d))}catch{}}
let contacts=ld(K.c,DC),deals=ld(K.d,DD),activities=ld(K.a,DA);
let stages=ld(K.s,DS),sellers=ld(K.v,['Eduardo','David Lopez','Cesar','Bretado']),lossReasons=ld(K.lr,['Precio alto','Competencia','Sin presupuesto','Proyecto cancelado','Sin respuesta']);
deals.forEach(d=>{if(!d.status)d.status='open';if(!d.lossReason)d.lossReason='';if(d.followUpDate===undefined)d.followUpDate=null;if(!d.followUpDesc)d.followUpDesc='';if(!d.followUpType)d.followUpType='';if(!d.seller)d.seller='';if(!d.periodicity)d.periodicity=7;});
activities.forEach(a=>{if(a.done===undefined)a.done=false;if(!a.dealId)a.dealId=null;});
function saveAll(){sv(K.c,contacts);sv(K.d,deals);sv(K.a,activities);sv(K.s,stages);sv(K.v,sellers);sv(K.lr,lossReasons);}
const AVC=['av-0','av-1','av-2','av-3','av-4','av-5'];
const STC=['bg-gray','bg-blue','bg-amber','bg-amber','bg-green','bg-teal','bg-purple'];
const SC={Cliente:'bg-teal',Prospecto:'bg-blue',Interesado:'bg-amber',Inactivo:'bg-gray'};
const AI={call:'📞',email:'✉️',meet:'📅',note:'📝'};
const AL={call:'Llamada con',email:'Email a',meet:'Reunión con',note:'Nota:'};
const ini=n=>n.split(' ').map(x=>x[0]).join('').substring(0,2).toUpperCase();
const avc=n=>AVC[n.charCodeAt(0)%AVC.length];
const fmt=v=>'$'+(v||0).toLocaleString('es-MX');
const nid=arr=>arr.length?Math.max(...arr.map(x=>x.id))+1:1;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gsi=name=>stages.findIndex(s=>s.name===name);
const gsc=name=>{const i=gsi(name);return STC[Math.min(Math.max(i,0),STC.length-1)];};
const td0=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
let pg='dashboard',q='',fSt='Todos',fSel='Todos',cfgTab='vendedores',showClosed=false,mFn=null;
let dSeller='Todos',dDateFrom='',dDateTo='',actTab='pending';
function show(p){pg=p;q='';fSt='Todos';fSel='Todos';document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));const el=document.getElementById('nav-'+p);if(el)el.classList.add('active');render();}
function render(){
  const mc=document.getElementById('mc');
  if(pg==='dashboard')mc.innerHTML='<div class="empty"><div class="empty-icon">📊</div><p>Dashboard CRM — Carga el archivo crm7.html completo para ver todos los datos</p></div>';
  else mc.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>Sección: '+pg+'</p></div>';
}
function openModal(){document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function saveModal(){if(mFn)mFn();}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
render();
</script>
</body>
</html>
